name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # ✅ updated

      - name: Setup Node
        uses: actions/setup-node@v4  # ✅ updated
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3   # ✅ FIXED
        with:
          path: ./dist

deploy:
  needs: build
  runs-on: ubuntu-latest

  environment:
    name: github-pages   # ✅ ADD THIS
    url: ${{ steps.deployment.outputs.page_url }}  # ✅ ADD THIS

  steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4